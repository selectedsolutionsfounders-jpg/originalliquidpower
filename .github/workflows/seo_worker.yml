name: Empleado IA SEO
on:
  schedule:
    - cron: '0 0 1 * *' # Se ejecuta automáticamente el día 1 de cada mes (cada ~30 días)
  workflow_dispatch: # Te permite seguir lanzándolo a mano cuando quieras desde la web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: pip install google-genai

      - name: Ejecutar IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python seo_bot.py

      - name: Subir cambios
        run: |
          git config user.name "Empleado IA"
          git config user.email "bot@seo.com"
          git add .
          git commit -m "Optimización SEO mensual con traducción en paralelo"
          git push